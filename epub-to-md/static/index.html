<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPUB to Markdown Converter</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="main-header">
    <h1>EPUB → Markdown Converter</h1>
    <p>Convert EPUB files to clean Markdown — one file or a whole batch.</p>
  </header>

  <main>
    <!-- Mode tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="single">Single File</button>
      <button class="tab-btn" data-tab="batch">Batch (Multiple Files)</button>
    </div>

    <!-- ── Single file panel ── -->
    <section id="tab-single" class="tab-panel active">
      <div id="drop-zone-single" class="drop-zone" role="button" tabindex="0"
           aria-label="Drop an EPUB file here or click to browse">
        <span class="drop-icon">📄</span>
        <p>Drag &amp; drop an <strong>.epub</strong> file here</p>
        <p class="sub">or <span class="link-btn">click to browse</span></p>
        <input type="file" id="file-input-single" accept=".epub" hidden />
      </div>
      <div id="single-selected" class="file-list hidden"></div>
      <button id="btn-convert-single" class="btn" disabled>Convert to Markdown</button>
      <div id="single-status" class="status hidden"></div>
    </section>

    <!-- ── Batch panel ── -->
    <section id="tab-batch" class="tab-panel hidden">
      <div id="drop-zone-batch" class="drop-zone" role="button" tabindex="0"
           aria-label="Drop EPUB files here or click to browse">
        <span class="drop-icon">📚</span>
        <p>Drag &amp; drop <strong>multiple .epub</strong> files here</p>
        <p class="sub">or <span class="link-btn">click to browse</span></p>
        <input type="file" id="file-input-batch" accept=".epub" multiple hidden />
      </div>
      <div id="batch-selected" class="file-list hidden"></div>
      <button id="btn-convert-batch" class="btn" disabled>Convert All → Download ZIP</button>
      <div id="batch-status" class="status hidden"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Math Tools</p>
  </footer>

  <script src="/static/script.js"></script>
</body>
</html>
